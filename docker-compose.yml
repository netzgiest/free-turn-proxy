services:
  btp:
    image: ghcr.io/samosvalishe/btp:latest
    # build: .
    network_mode: host
    restart: unless-stopped
    environment:
      # Backend address: WireGuard → 127.0.0.1:51820 | Xray/sing-box → 127.0.0.1:443
      CONNECT_ADDR: "127.0.0.1:51820"
      # LISTEN_ADDR: "0.0.0.0:56000"
      # MODE: "tcp"           # tcp = TCP-форвардер для Xray/sing-box; default udp = WireGuard
      # OBF_MODE: "true"
      # OBF_KEY: ""           # 64 hex chars; required when OBF_MODE=true
      # DEBUG: "false"
